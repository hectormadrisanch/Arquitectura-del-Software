<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de clientes</title>
</head>
<body>
    <h1>Clientes del taller</h1>

    <div style="margin-bottom: 20px;">
        <a href="{% url 'nuevo_cliente' %}"> Añadir Cliente</a> | 
        <a href="{% url 'nuevo_coche' %}"> Registrar Coche</a> | 
        <a href="{% url 'nuevo_servicio' %}"> Crear Servicio</a> 
        <a href="{% url 'contratar_servicio' %}"> Contratar Servicio</a>
    </div>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in clientes %}
            <tr>
                <td>{{ cliente.id }}</td>
                <td>
                    <a href="{% url 'detalle_cliente' cliente.id %}">{{ cliente.nombre }}</a>
                </td>
                <td>{{ cliente.telefono }}</td>
                <td>{{ cliente.email }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
